# Read the Docs configuration for rinexpy.
#
# Builds the MkDocs Material site that lives under docs/. The site is
# defined by mkdocs.yml at the repository root.
#
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      - pip install -r docs/requirements.txt

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

formats:
  - htmlzip
