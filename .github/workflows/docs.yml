name: docs

# Build the mkdocs-material site on every push to main and publish
# it to GitHub Pages. Pull-request runs build (so reviewers can
# catch broken docs) but don't deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub Pages requires write permission on the deploy job; everything
# else stays read-only.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install mkdocs deps
        run: uv pip install --system mkdocs-material pymdown-extensions
      - name: Stage non-docs/ files into docs/
        # The repo root holds README.md, CHANGELOG.md, CONTRIBUTING.md,
        # SCRATCHPAD.md — surface them to mkdocs by copying into docs/
        # for the build only (we don't want them on disk twice).
        run: |
          cp README.md docs/index.md
          cp CHANGELOG.md docs/CHANGELOG.md
          cp CONTRIBUTING.md docs/CONTRIBUTING.md
          cp SCRATCHPAD.md docs/SCRATCHPAD.md
      - name: Build
        run: mkdocs build --strict --site-dir _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
