name: release

# Triggered by pushing a tag of the form vX.Y.Z (or vX.Y.Z.devN, vX.Y.ZrcN).
# Builds and publishes both packages to PyPI via trusted publishing —
# no API tokens stored anywhere. Configure the trusted publisher at
# https://pypi.org/manage/account/publishing/.
#
# The workflow has two parallel "build" stages (one per package) and a
# single "publish" stage that downloads both artifact sets and uploads
# them in one shot.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-rinexpy:
    name: Build pure-Python rinexpy wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Build distributions
        run: uv build --wheel --sdist
      - name: Verify wheel installs cleanly
        run: |
          uv venv .verify
          uv pip install --python .verify/bin/python dist/*.whl
          .verify/bin/python -c "import rinexpy; print(rinexpy.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: rinexpy-dists
          path: dist/*

  build-native-wheels:
    name: Build rinexpy-native wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build cibuildwheel matrix
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: native
          output-dir: dist-native
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_i686 pp*"
          CIBW_TEST_COMMAND: >
            python -c "from rinexpy_native import decode_obs_batch;
            import numpy as np;
            out = decode_obs_batch(np.zeros(32, dtype=np.uint8), 1, 2);
            assert out.shape == (1, 6)"
      - uses: actions/upload-artifact@v4
        with:
          name: rinexpy-native-wheels-${{ matrix.os }}
          path: dist-native/*.whl

  build-native-sdist:
    name: Build rinexpy-native sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist native -o dist-native-sdist
      - uses: actions/upload-artifact@v4
        with:
          name: rinexpy-native-sdist
          path: dist-native-sdist/*.tar.gz

  publish-rinexpy:
    name: Publish rinexpy to PyPI
    needs: build-rinexpy
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rinexpy
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rinexpy-dists
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-native:
    name: Publish rinexpy-native to PyPI
    needs: [build-native-wheels, build-native-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rinexpy-native
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rinexpy-native-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach artifacts to the GitHub release
    needs: [publish-rinexpy, publish-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
