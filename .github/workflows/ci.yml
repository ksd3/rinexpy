name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dev deps
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check src/ tests/ benchmarks/
      - name: ruff format --check
        run: uv run ruff format --check src/ tests/ benchmarks/

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install
        run: uv sync --all-extras --python ${{ matrix.python }}
      - name: Run tests
        run: uv run --python ${{ matrix.python }} pytest tests/ -q --tb=short

  parity:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install with georinex
        run: |
          uv sync --all-extras
          uv pip install georinex
      - name: Run parity tests
        run: uv run pytest tests/test_parity.py -q --tb=short

  benchmark:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install with georinex
        run: |
          uv sync --all-extras
          uv pip install georinex
      - name: Run benchmarks
        run: uv run python benchmarks/bench_obs3.py
